<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <script type="text/javascript" charset="UTF-8"
    src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />

  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
  <style>
    body {
      font-family: sans-serif;
    }

    .sir-grid {
      display: grid;
      grid-template-columns: minmax(260px, 320px) 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    /* Prevent grid columns from expanding due to large min-content widths inside JSXGraph containers */
    .sir-grid>* {
      min-width: 0;
    }

    .sir-panel {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      background: #fafafa;
    }

    .sir-panel h2 {
      font-size: 16px;
      margin: 0 0 10px 0;
    }

    .sir-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }

    .sir-row input[type="number"] {
      width: 100%;
      padding: 4px 6px;
      box-sizing: border-box;
    }

    .sir-row input[type="range"] {
      width: 100%;
    }

    .sir-small {
      font-size: 12px;
      color: #444;
      line-height: 1.4;
      margin-top: 10px;
    }

    .sir-plot {
      width: 100%;
      height: 600px;
      overflow: hidden;
    }
  </style>

  <title>SIR Epidemic Model</title>
</head>

<body>
  <h1>SIR Epidemic Model</h1>
  <p>
    We visualize the SIR system
    \[
    \begin{aligned}
    S'(t) &= -\alpha\,S(t)\,I(t),\\
    I'(t) &= \alpha\,S(t)\,I(t)-\beta\,I(t),\\
    R'(t) &= \beta\,I(t),
    \end{aligned}
    \]
    and additionally \(N(t):=S(t)+I(t)+R(t)\).
  </p>

  <div class="sir-grid">
    <div class="sir-panel">
      <h2>Parameters</h2>

      <div class="sir-row">
        <label for="alphaRange">α</label>
        <input id="alphaRange" type="range" min="0" max="0.01" step="0.0001" value="0.0005">
      </div>
      <div class="sir-row">
        <label for="betaRange">β</label>
        <input id="betaRange" type="range" min="0" max="2" step="0.01" value="0.10">
      </div>

      <h2 style="margin-top:14px;">Initial values</h2>
      <div class="sir-row">
        <label for="S0Input">S₀</label>
        <input id="S0Input" type="number" min="0" step="1" value="999">
      </div>
      <div class="sir-row">
        <label for="I0Input">I₀</label>
        <input id="I0Input" type="number" min="0" step="1" value="1">
      </div>
      <div class="sir-row">
        <label for="R0Input">R₀</label>
        <input id="R0Input" type="number" min="0" step="1" value="0">
      </div>

      <h2 style="margin-top:14px;">Simulation</h2>
      <div class="sir-row">
        <label for="TInput">T</label>
        <input id="TInput" type="number" min="0.001" step="1" value="160">
      </div>
      <div class="sir-row">
        <label for="NstInput">Nₛₜ</label>
        <input id="NstInput" type="number" min="10" step="10" value="4000">
      </div>
      <div class="sir-row">
        <label for="hInput">h</label>
        <input id="hInput" type="number" min="0.000001" step="0.001" value="">
      </div>
      <div class="sir-row">
        <span></span>
        <button id="simulateBtn" type="button">Simulate</button>
      </div>

      <div class="sir-small" id="infoText"></div>
    </div>

    <div>
      <div id="jxgboxTime" class="jxgbox sir-plot"></div>
    </div>

    <div>
      <div id="jxgboxPhase" class="jxgbox sir-plot"></div>
    </div>
  </div>

  <script language="JavaScript">
    JXG.Options.text.useMathJax = true;

    var boardPhase, boardTime;
    var alphaRange, betaRange;
    var S0Input, I0Input, R0Input;
    var TInput, NstInput, hInput;
    var simulateBtn, infoText;

    var curvePhase, curveS, curveI, curveR, curveN;
    var sim = { t: [], S: [], I: [], R: [], N: [] };

    function parseNumber(value, fallback) {
      var n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function parseIntNumber(value, fallback) {
      var n = parseInt(value, 10);
      return Number.isFinite(n) ? n : fallback;
    }

    function readParams() {
      var alpha = parseNumber(alphaRange.value, 0.0005);
      var beta = parseNumber(betaRange.value, 0.1);

      var S0 = parseNumber(S0Input.value, 999);
      var I0 = parseNumber(I0Input.value, 1);
      var R0 = parseNumber(R0Input.value, 0);

      if (S0 < 0) S0 = 0;
      if (I0 < 0) I0 = 0;
      if (R0 < 0) R0 = 0;

      var T = parseNumber(TInput.value, 160);
      if (T <= 0) T = 160;

      var Nst = parseIntNumber(NstInput.value, 4000);
      if (Nst < 10) Nst = 10;

      var hUser = parseNumber(hInput.value, NaN);
      if (Number.isFinite(hUser) && hUser > 0) {
        Nst = Math.max(10, Math.round(T / hUser));
        NstInput.value = String(Nst);
      }

      var h = T / Nst;
      hInput.value = String(Number(h.toPrecision(6)));

      return { alpha: alpha, beta: beta, S0: S0, I0: I0, R0: R0, T: T, Nst: Nst, h: h };
    }

    function computeSimulation(params) {
      var I = [0, params.T];
      var N = params.Nst;

      var f = function (t, x) {
        var S = x[0];
        var I = x[1];
        var dS = -params.alpha * S * I;
        var dI = params.alpha * S * I - params.beta * I;
        var dR = params.beta * I;
        return [dS, dI, dR];
      };

      var x0 = [params.S0, params.I0, params.R0];
      var data = JXG.Math.Numerics.rungeKutta('rk4', x0, I, N, f);

      var t = [];
      var Sarr = [];
      var Iarr = [];
      var Rarr = [];
      var Narr = [];

      var h = (I[1] - I[0]) / N;
      for (var k = 0; k < data.length; k++) {
        var tk = I[0] + k * h;
        var Sk = data[k][0];
        var Ik = data[k][1];
        var Rk = data[k][2];
        t.push(tk);
        Sarr.push(Sk);
        Iarr.push(Ik);
        Rarr.push(Rk);
        Narr.push(Sk + Ik + Rk);
      }

      return { t: t, S: Sarr, I: Iarr, R: Rarr, N: Narr };
    }

    function updateBoundingBoxes(params, simData) {
      var N0 = params.S0 + params.I0 + params.R0;
      if (!Number.isFinite(N0) || N0 === 0) N0 = 1;

      var yMax = N0;
      for (var i = 0; i < simData.N.length; i++) {
        if (Number.isFinite(simData.N[i])) yMax = Math.max(yMax, simData.N[i]);
      }
      if (!Number.isFinite(yMax) || yMax <= 0) yMax = 1;
      yMax = Math.max(yMax, 1.0);

      var pad = 0.05 * yMax;

      var iMax = 0;
      for (var k = 0; k < simData.I.length; k++) {
        if (Number.isFinite(simData.I[k])) iMax = Math.max(iMax, simData.I[k]);
      }
      if (!Number.isFinite(iMax) || iMax <= 0) iMax = Math.max(1.0, 0.1 * yMax);

      var timeTop = yMax + pad;
      var timeBox = [0, timeTop, params.T, -pad];

      var phasePadX = Math.max(1, 0.03 * yMax);
      var phasePadY = Math.max(1, 0.05 * iMax);
      var phaseBox = [-phasePadX, iMax + phasePadY, yMax + phasePadX, -phasePadY]; // x=S, y=I

      boardPhase.setBoundingBox(phaseBox, false);
      boardTime.setBoundingBox(timeBox, false);
    }

    function recompute(params) {
      sim = computeSimulation(params);
      updateBoundingBoxes(params, sim);
    }

    function init() {
      boardTime = JXG.JSXGraph.initBoard('jxgboxTime', {
        axis: true,
        boundingbox: [0, 1.1, 50, -0.1]
      });

      boardPhase = JXG.JSXGraph.initBoard('jxgboxPhase', {
        axis: true,
        boundingbox: [-1, 10, 10, -1]
      });

      boardTime.create('text', [function () { return [0.02 * boardTime.getBoundingBox()[2], 0.95 * boardTime.getBoundingBox()[1]]; }, 'Time series: S(t), I(t), R(t), N(t)'], { fixed: true });
      boardPhase.create('text', [function () { return [0.02 * boardPhase.getBoundingBox()[2], 0.95 * boardPhase.getBoundingBox()[1]]; }, 'Phase space: (S(t), I(t))'], { fixed: true });

      curvePhase = boardPhase.create('curve', [[], []], { strokeWidth: 3, strokeColor: JXG.palette.red });
      curvePhase.updateDataArray = function () {
        this.dataX = [];
        this.dataY = [];
        for (var i = 0; i < sim.S.length; i++) {
          this.dataX[i] = sim.S[i];
          this.dataY[i] = sim.I[i];
        }
      };

      curveS = boardTime.create('curve', [[], []], { strokeWidth: 2, strokeColor: '#1f77b4' });
      curveS.updateDataArray = function () {
        this.dataX = [];
        this.dataY = [];
        for (var i = 0; i < sim.t.length; i++) {
          this.dataX[i] = sim.t[i];
          this.dataY[i] = sim.S[i];
        }
      };
      curveI = boardTime.create('curve', [[], []], { strokeWidth: 2, strokeColor: '#d62728' });
      curveI.updateDataArray = function () {
        this.dataX = [];
        this.dataY = [];
        for (var i = 0; i < sim.t.length; i++) {
          this.dataX[i] = sim.t[i];
          this.dataY[i] = sim.I[i];
        }
      };
      curveR = boardTime.create('curve', [[], []], { strokeWidth: 2, strokeColor: '#2ca02c' });
      curveR.updateDataArray = function () {
        this.dataX = [];
        this.dataY = [];
        for (var i = 0; i < sim.t.length; i++) {
          this.dataX[i] = sim.t[i];
          this.dataY[i] = sim.R[i];
        }
      };
      curveN = boardTime.create('curve', [[], []], { strokeWidth: 2, dash: 2, strokeColor: '#111111' });
      curveN.updateDataArray = function () {
        this.dataX = [];
        this.dataY = [];
        for (var i = 0; i < sim.t.length; i++) {
          this.dataX[i] = sim.t[i];
          this.dataY[i] = sim.N[i];
        }
      };
    }

    function updateInfo(params) {
      var N0 = params.S0 + params.I0 + params.R0;
      var r0 = (params.beta > 0) ? (params.alpha * N0 / params.beta) : Infinity;
      var r0Text = Number.isFinite(r0) ? r0.toFixed(3) : '∞';
      infoText.textContent = 'N0=' + N0.toFixed(3) + ', h=' + params.h.toPrecision(6) + ', R0≈α·N0/β=' + r0Text + ' (absolute counts)';
    }

    function plot() {
      var params = readParams();
      recompute(params);
      updateInfo(params);
      boardPhase.update();
      boardTime.update();
    }

    function wireControls() {
      alphaRange.addEventListener('input', function () { plot(); });
      betaRange.addEventListener('input', function () { plot(); });
      [S0Input, I0Input, R0Input, TInput, NstInput].forEach(function (el) {
        el.addEventListener('change', function () { plot(); });
      });

      // If h is changed, recompute Nst from T/h. Use change (not input) to avoid jitter while typing.
      hInput.addEventListener('change', function () { plot(); });
      simulateBtn.addEventListener('click', function () { plot(); });
    }

    function initControls() {
      alphaRange = document.getElementById('alphaRange');
      betaRange = document.getElementById('betaRange');
      S0Input = document.getElementById('S0Input');
      I0Input = document.getElementById('I0Input');
      R0Input = document.getElementById('R0Input');
      TInput = document.getElementById('TInput');
      NstInput = document.getElementById('NstInput');
      hInput = document.getElementById('hInput');
      simulateBtn = document.getElementById('simulateBtn');
      infoText = document.getElementById('infoText');
    }

    initControls();
    init();
    wireControls();
    plot();
  </script>
</body>

<footer>Wigand Rathmann, FAU</footer>

</html>
